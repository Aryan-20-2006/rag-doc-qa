<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TraceAI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 8px;
      color: #ffffff;
    }

    p.subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 40px;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 640px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 14px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 16px;
    }

    input[type="file"] {
      display: none;
    }

    .file-label {
      display: block;
      border: 1.5px dashed #333;
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      color: #555;
      font-size: 14px;
      transition: border-color 0.2s, color 0.2s;
    }

    .file-label:hover {
      border-color: #4f8ef7;
      color: #4f8ef7;
    }

    .file-label span {
      display: block;
      font-size: 12px;
      margin-top: 6px;
      color: #444;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #4f8ef7;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s;
    }

    button:hover { background: #3a7de0; }
    button:disabled { background: #333; color: #555; cursor: not-allowed; }

    .status {
      font-size: 13px;
      margin-top: 10px;
      min-height: 20px;
      color: #4caf50;
    }

    .status.error { color: #f44336; }

    .chat-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 16px;
      max-height: 360px;
      overflow-y: auto;
    }

    .message {
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 90%;
    }

    .message.user {
      background: #1e3a5f;
      color: #a8d0ff;
      align-self: flex-end;
    }

    .message.bot {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      color: #e0e0e0;
      align-self: flex-start;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
    }

    .input-row input:focus { border-color: #4f8ef7; }

    .input-row button {
      width: auto;
      padding: 10px 20px;
      margin-top: 0;
    }

    #file-name {
      font-size: 13px;
      color: #4f8ef7;
      margin-top: 8px;
      min-height: 18px;
    }
  </style>
</head>
<body>

  <h1>TraceAI</h1>
  <p class="subtitle">Ask questions about any PDF — every answer traced back to its source</p>

  <div class="card">
    <h2>Upload Document</h2>
    <label class="file-label" for="pdf-input">
      Click to select a PDF
      <span>Only .pdf files supported</span>
    </label>
    <input type="file" id="pdf-input" accept=".pdf" />
    <div id="file-name"></div>
    <button id="upload-btn" disabled>Upload</button>
    <div class="status" id="upload-status"></div>
  </div>

  <div class="card">
    <h2>Ask a Question</h2>
    <div class="chat-box" id="chat-box"></div>
    <div class="input-row">
      <input type="text" id="question-input" placeholder="Ask something about your document..." />
      <button id="ask-btn">Ask</button>
    </div>
  </div>

  <script>
    const pdfInput = document.getElementById('pdf-input');
    const uploadBtn = document.getElementById('upload-btn');
    const uploadStatus = document.getElementById('upload-status');
    const fileNameDiv = document.getElementById('file-name');
    const chatBox = document.getElementById('chat-box');
    const questionInput = document.getElementById('question-input');
    const askBtn = document.getElementById('ask-btn');

    const API = '';

    pdfInput.addEventListener('change', () => {
      if (pdfInput.files[0]) {
        fileNameDiv.textContent = pdfInput.files[0].name;
        uploadBtn.disabled = false;
      }
    });

    uploadBtn.addEventListener('click', async () => {
      const file = pdfInput.files[0];
      if (!file) return;

      uploadBtn.disabled = true;
      uploadStatus.textContent = 'Uploading...';
      uploadStatus.className = 'status';

      const formData = new FormData();
      formData.append('file', file);

      try {
        const res = await fetch(`${API}/upload`, {
          method: 'POST',
          body: formData
        });
        const data = await res.json();
        uploadStatus.textContent = `✓ ${data.filename} indexed (${data.total_chunks} chunks)`;
      } catch (err) {
        uploadStatus.textContent = 'Upload failed. Is the server running?';
        uploadStatus.className = 'status error';
        uploadBtn.disabled = false;
      }
    });

    askBtn.addEventListener('click', async () => {
      const question = questionInput.value.trim();
      if (!question) return;

      addMessage(question, 'user');
      questionInput.value = '';
      askBtn.disabled = true;

      try {
        const res = await fetch(`${API}/ask`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        addMessage(data.answer, 'bot');
      } catch (err) {
        addMessage('Error contacting the server.', 'bot');
      }

      askBtn.disabled = false;
    });

    questionInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') askBtn.click();
    });

    function addMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `message ${sender}`;
      div.textContent = text;
      chatBox.appendChild(div);
    }
  </script>

</body>
</html>
